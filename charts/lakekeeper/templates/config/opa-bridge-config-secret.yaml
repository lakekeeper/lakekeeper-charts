{{- if .Values.OPABridge.enabled }}
{{- if not .Values.OPABridge.lakekeeper.tokenEndpoint }}
  {{- fail "OPABridge is enabled but OPABridge.lakekeeper.tokenEndpoint is not set. Please provide a valid token endpoint." }}
{{- end }}
{{- if not .Values.OPABridge.lakekeeper.clientId }}
  {{- fail "OPABridge is enabled but OPABridge.lakekeeper.clientId is not set. Please provide a valid client ID." }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "iceberg-catalog.fullname" . }}-opa-config
  labels:
    {{- include "iceberg-catalog.labels" . | nindent 4 }}
    app.kubernetes.io/component: opa-bridge
type: Opaque
stringData:
  config.yaml: |
    {{- toYaml .Values.OPABridge.opaConfig | nindent 4 }}
{{- end }}
